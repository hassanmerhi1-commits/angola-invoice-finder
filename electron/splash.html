<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXOR ERP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #0f1f3a 0%, #050a14 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: white;
      overflow: hidden;
      -webkit-app-region: drag;
    }
    .logo-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .logo {
      width: 140px;
      height: 140px;
      background-image: url('splash.png');
      background-size: cover;
      background-position: center;
      filter: drop-shadow(0 12px 40px rgba(56, 132, 255, 0.5));
      animation: float 3s ease-in-out infinite;
    }
    /* Fallback if splash.png isn't loaded — show NEXOR text only */
    .brand-text {
      font-size: 38px;
      font-weight: 700;
      letter-spacing: 6px;
      background: linear-gradient(135deg, #ffffff 0%, #8ab4ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .erp-badge {
      font-size: 13px;
      letter-spacing: 8px;
      color: rgba(138, 180, 255, 0.7);
      margin-top: -8px;
    }
    .tagline {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 18px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .loader {
      margin-top: 48px;
      display: flex;
      gap: 8px;
    }
    .loader-dot {
      width: 8px;
      height: 8px;
      background: rgba(138, 180, 255, 0.3);
      border-radius: 50%;
      animation: loading 1.4s ease-in-out infinite;
    }
    .loader-dot:nth-child(1) { animation-delay: 0s; }
    .loader-dot:nth-child(2) { animation-delay: 0.2s; }
    .loader-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes loading {
      0%, 80%, 100% { background: rgba(138, 180, 255, 0.3); transform: scale(1); }
      40% { background: #3884ff; transform: scale(1.3); }
    }
    .version {
      position: absolute;
      bottom: 20px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <div class="logo"></div>
    <h1 class="brand-text">NEXOR</h1>
    <p class="erp-badge">E R P</p>
    <p class="tagline">O futuro é construído com nós</p>
  </div>
  <div class="loader">
    <div class="loader-dot"></div>
    <div class="loader-dot"></div>
    <div class="loader-dot"></div>
  </div>
  <p class="version">v1.0.38</p>
</body>
</html>
